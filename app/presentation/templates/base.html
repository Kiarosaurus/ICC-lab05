<!doctype html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block titulo %}PrediMundial{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-mundial sticky-top">
    <div class="container">
      <a class="navbar-brand" href="/">
        <span class="brand-balon">⚽</span> Predi<span class="brand-acento">Mundial</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#menuPrincipal" aria-controls="menuPrincipal"
              aria-expanded="false" aria-label="Abrir menú">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menuPrincipal">
        <ul class="navbar-nav ms-auto gap-lg-2">
          <li class="nav-item">
            <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">Partidos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.url.path == '/predicciones' %}active{% endif %}" href="/predicciones">Mis Predicciones</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="franja-cancha"></div>

  <main class="container py-4 py-lg-5">
    {% block contenido %}{% endblock %}
  </main>

  <footer class="footer-mundial">
    <div class="container">
      <strong>⚽ PrediMundial</strong> · Laboratorio — Arquitectura de 3 capas
      (Presentación · Negocio · Datos)
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
