services:
  db:
    image: postgres:15
    container_name: mundial-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mundial}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mundial123}
      POSTGRES_DB: ${POSTGRES_DB:-mundial}
    volumes:
      # Persistencia: los datos sobreviven a `docker compose down` y reinicios.
      - datos_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    build: .
    container_name: mundial-web
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-mundial}
      DB_USER: ${POSTGRES_USER:-mundial}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-mundial123}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  datos_postgres:
